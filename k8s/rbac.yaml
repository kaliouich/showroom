apiVersion: v1
kind: ServiceAccount
metadata:
  name: showcase-sa
  namespace: showcase
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: showcase-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: showcase-reader-binding
subjects:
- kind: ServiceAccount
  name: showcase-sa
  namespace: showcase
roleRef:
  kind: ClusterRole
  name: showcase-reader
  apiGroup: rbac.authorization.k8s.io
