apiVersion: v1
kind: ConfigMap
metadata:
  name: tamagotchi-dashboard
  namespace: tamagotchi
  labels:
    grafana_dashboard: "1"
data:
  tamagotchi.json: |
    {
      "uid": "ajntj2",
      "title": "🐣 Tamagotchi as a Service",
      "tags": [ "tamagotchi", "demo" ],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 0,
      "refresh": "10s",
      "panels": [
        {
          "type": "stat",
          "title": "Alive Creatures",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "tamagotchi_creatures_alive_total", "format": "time_series" }]
        },
        {
          "type": "stat",
          "title": "Dead Creatures",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "tamagotchi_creatures_dead_total", "format": "time_series" }]
        },
        {
          "type": "timeseries",
          "title": "Interactions (Rate)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "rate(tamagotchi_feed_actions_total[1m])", "legendFormat": "Feed Rate" },
            { "expr": "rate(tamagotchi_play_actions_total[1m])", "legendFormat": "Play Rate" },
            { "expr": "rate(tamagotchi_sleep_actions_total[1m])", "legendFormat": "Sleep Rate" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Average Stats (Hunger, Happiness, Energy)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            { "expr": "avg(tamagotchi_hunger_level)", "legendFormat": "Average Hunger" },
            { "expr": "avg(tamagotchi_happiness_score)", "legendFormat": "Average Happiness" },
            { "expr": "avg(tamagotchi_energy_level)", "legendFormat": "Average Energy" }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Request Duration",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "rate(tamagotchi_http_request_duration_seconds_sum[1m]) / rate(tamagotchi_http_request_duration_seconds_count[1m])", "legendFormat": "Average Request Latency (s)" }
          ]
        }
      ]
    }
