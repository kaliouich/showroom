# ClusterIssuer Let's Encrypt (production).
#
# Le solver HTTP-01 s'appuie sur Gateway API : cert-manager crée une HTTPRoute
# temporaire attachée à main-gateway pour résoudre le challenge ACME.
# (L'ancien solver ciblait `ingress: class: nginx`, supprimé lors de la migration
# vers Envoy Gateway — il était donc cassé, d'où l'installation manuelle du cert.)
#
# Nécessite le flag `--enable-gateway-api` sur le déploiement cert-manager.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: khalil.aliouich@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: default
                kind: Gateway
