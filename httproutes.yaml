apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: linkerd-route
  namespace: linkerd-viz
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "linkerd.<YOUR_VM_IP>.nip.io"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: URLRewrite
      urlRewrite:
        hostname: web.linkerd-viz.svc.cluster.local
    backendRefs:
    - name: web
      port: 8084
