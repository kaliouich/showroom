apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: showcase-route
  namespace: showcase
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "showcase.khalilaliouich.com"
  - "khalilaliouich.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: showcase-website
      port: 80
---
